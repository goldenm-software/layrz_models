name: "Checks"

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

env:
  FLUTTER_VERSION: "3.44.6"

jobs:
  lint-dart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: goldenm-software/layrz-actions/.github/actions/check-dart@v1
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          run-tests: false

  test-dart:
    runs-on: ubuntu-latest
    needs: [lint-dart]
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    steps:
      - uses: actions/checkout@v7

      - name: Setup Flutter
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: ${{ env.FLUTTER_VERSION }}
          cache: true
          cache-sdk: true
          cache-key: ${{ runner.os }}-flutter-${{ hashFiles('pubspec.yaml') }}

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests (shard ${{ matrix.shard }} of 4)
        run: |
          FILES=$(find test -name '*_test.dart' | sort | awk "NR % 4 == ${{ matrix.shard }}")
          flutter test --machine --coverage $FILES 2>&1 | tee test-results.json; exit ${PIPESTATUS[0]}

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: Unit Tests (shard ${{ matrix.shard }})
          path: test-results.json
          reporter: flutter-json

      - name: Upload shard coverage
        uses: actions/upload-artifact@v7
        with:
          name: dart-coverage-${{ github.run_id }}-${{ matrix.shard }}
          path: coverage/lcov.info
          retention-days: 1

  coverage:
    needs: [test-dart, lint-dart]
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Download shard coverage artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: dart-coverage-${{ github.run_id }}-*
          path: shards

      - name: Merge shard coverage
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lcov
          mkdir -p dart-coverage
          ARGS=""
          for f in shards/*/lcov.info; do ARGS="$ARGS -a $f"; done
          lcov $ARGS -o dart-coverage/lcov.info

      - name: Setup Flutter
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: ${{ env.FLUTTER_VERSION }}
          cache: true
          cache-sdk: true
          cache-key: ${{ runner.os }}-flutter-${{ hashFiles('pubspec.yaml') }}

      - name: Strip coverage-ignored regions
        run: dart tool/strip_ignored_coverage.dart dart-coverage/lcov.info

      - uses: goldenm-software/layrz-actions/.github/actions/coverage-comment@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          enable-dart: true
          dart-coverage-path: dart-coverage/lcov.info

      - uses: goldenm-software/layrz-actions/.github/actions/coverage-check@v1
        with:
          enable-dart: true
          dart-coverage-path: dart-coverage/lcov.info
          threshold: '55'

  changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: goldenm-software/layrz-actions/.github/actions/changelog@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          post-comment: true
