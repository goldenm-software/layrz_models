name: "Checks"

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

env:
  FLUTTER_VERSION: "3.44.6"

jobs:
  lint-dart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: goldenm-software/layrz-actions/.github/actions/check-dart@v1
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          run-tests: true
          artifact-name: 'dart-coverage-${{ github.run_id }}'

  coverage:
    needs: lint-dart
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Download coverage artifacts
        uses: actions/download-artifact@v8
        with:
          name: dart-coverage-${{ github.run_id }}
          path: dart-coverage

      - name: Setup Flutter
        uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: ${{ env.FLUTTER_VERSION }}
          cache: true
          cache-sdk: true
          cache-key: ${{ runner.os }}-flutter-${{ hashFiles('pubspec.yaml') }}

      - name: Strip coverage-ignored regions
        run: dart tool/strip_ignored_coverage.dart dart-coverage/lcov.info

      - uses: goldenm-software/layrz-actions/.github/actions/coverage-comment@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          enable-dart: true
          dart-coverage-path: dart-coverage/lcov.info

      - uses: goldenm-software/layrz-actions/.github/actions/coverage-check@v1
        with:
          enable-dart: true
          dart-coverage-path: dart-coverage/lcov.info
          threshold: '55'

  changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: goldenm-software/layrz-actions/.github/actions/changelog@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          post-comment: true
